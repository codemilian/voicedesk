<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>VoiceDesk AI — connecting…</title>
<style>
  body{margin:0;font-family:-apple-system,'Segoe UI',Arial,sans-serif;background:#0f172a;color:#e2e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center}
  .card{max-width:420px;padding:40px 32px}
  .logo{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:18px}
  .logo span{color:#38bdf8}
  .spinner{width:36px;height:36px;border:3px solid #1e293b;border-top-color:#38bdf8;border-radius:50%;margin:0 auto 18px;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  p{color:#94a3b8;font-size:15px;line-height:1.6;margin:6px 0}
  .hidden{display:none}
  button{margin-top:14px;background:#38bdf8;color:#0f172a;border:0;border-radius:8px;padding:10px 22px;font-size:15px;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div class="card">
  <div class="logo">VoiceDesk<span>AI</span></div>
  <div id="loading">
    <div class="spinner"></div>
    <p>Connecting you to your live AI receptionist…</p>
  </div>
  <div id="offline" class="hidden">
    <p><strong>The live demo is waking up.</strong></p>
    <p>It's briefly offline — usually back within minutes. Your personalized demo is saved and this link will keep working.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</div>
<script>
(function () {
  var REPO = "/voicedesk";
  var path = location.pathname;
  var sub = path.indexOf(REPO) === 0 ? path.slice(REPO.length) : path;
  if (!sub || sub === '/404.html') sub = '/';
  sub += location.search || '';

  function offline() {
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('offline').classList.remove('hidden');
    setTimeout(function () { location.reload(); }, 30000);
  }

  fetch(REPO + '/config.json?t=' + Date.now(), { cache: 'no-store' })
    .then(function (r) { return r.json(); })
    .then(function (cfg) {
      var target = cfg.base + sub;
      // no-cors probe: resolves if the funnel is reachable, rejects if down
      var probe = fetch(cfg.base + '/health', { mode: 'no-cors', cache: 'no-store' });
      var timer = new Promise(function (_, rej) { setTimeout(rej, 6000); });
      Promise.race([probe, timer])
        .then(function () { location.replace(target); })
        .catch(offline);
    })
    .catch(offline);
})();
</script>
</body>
</html>
